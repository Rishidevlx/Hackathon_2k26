# =============================================
# 🚀 Netlify Config — Admin Panel
# Base: admin/  →  publishes admin/dist/
# =============================================

[build]
  base    = "admin"
  publish = "dist"
  command = "npm run build"

# React Router SPA fallback
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
